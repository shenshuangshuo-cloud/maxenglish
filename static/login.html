<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroEnglish - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <span class="login-logo">M</span>
                <h1 class="login-title">MicroEnglish</h1>
                <p class="login-subtitle">英语听力听写练习</p>
            </div>

            <!-- 游客试用 -->
            <div class="login-option login-option-guest">
                <div class="login-option-icon">🎧</div>
                <div class="login-option-body">
                    <h3>免登录试用</h3>
                    <p>无需注册，立即开始练习</p>
                </div>
                <button id="btn-guest" class="login-btn login-btn-guest">开始试用 →</button>
            </div>

            <!-- 微信登录 -->
            <div class="login-option login-option-wechat">
                <div class="login-option-icon">💬</div>
                <div class="login-option-body">
                    <h3>微信登录</h3>
                    <p>扫码登录，记录学习进度</p>
                </div>
                <button id="btn-wechat" class="login-btn login-btn-wechat">微信扫码登录</button>
            </div>

            <!-- 管理员登录 -->
            <div class="login-option login-option-admin">
                <div class="login-option-icon">🔐</div>
                <div class="login-option-body">
                    <h3>管理员登录</h3>
                    <p>使用账号密码登录管理后台</p>
                </div>
                <button id="btn-admin" class="login-btn login-btn-admin">管理员登录</button>
            </div>

            <div id="login-status" class="login-status hidden"></div>
        </div>
    </div>

    <!-- 管理员登录模态框 -->
    <div id="admin-modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 class="modal-title">管理员登录</h2>
            <form id="admin-login-form" class="modal-form">
                <div class="form-group">
                    <label for="admin-username">账号</label>
                    <input type="text" id="admin-username" placeholder="请输入管理员账号" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="admin-password">密码</label>
                    <input type="password" id="admin-password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div id="admin-login-error" class="modal-error hidden"></div>
                <div class="modal-actions">
                    <button type="button" id="btn-admin-cancel" class="modal-btn modal-btn-cancel">取消</button>
                    <button type="submit" id="btn-admin-submit" class="modal-btn modal-btn-primary">登录</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
